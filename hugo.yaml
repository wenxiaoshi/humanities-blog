baseURL: "https://wenxiaoshi.github.io/humanities-blog/"
languageCode: zh-cn
title: "Wenshy · 人文随笔"
theme: hugo-theme-stack

defaultContentLanguage: zh-cn
defaultContentLanguageInSubdir: false

pagination:
  pagerSize: 100

languages:
  zh-cn:
    languageName: 中文
    weight: 1
    title: "Wenshy · 人文随笔"
    params:
      sidebar:
        subtitle: "诗歌 · 随笔 · 生活记录"
    menu:
      main:
        - identifier: about
          name: 关于我
          url: /about/
          weight: 1
          params:
            icon: user
        - identifier: poetry
          name: 于是我开始写诗
          url: /categories/诗歌/
          weight: 2
          params:
            icon: infinity
        - identifier: treasure
          name: 山洞里的宝藏
          url: /categories/香水/
          weight: 3
          params:
            icon: search
        - identifier: life
          name: 生活随笔
          url: /categories/生活/
          weight: 4
          params:
            icon: messages
      social:
        - identifier: github
          name: GitHub
          url: https://github.com/wenxiaoshi
          params:
            icon: brand-github
  en:
    languageName: English
    weight: 2
    title: "Wenshy · Humanities"
    params:
      sidebar:
        subtitle: "Poetry · Essays · Life Notes"
    menu:
      main:
        - identifier: about
          name: About
          url: /en/about/
          weight: 1
          params:
            icon: user
        - identifier: poetry
          name: Poetry
          url: /en/categories/poetry/
          weight: 2
          params:
            icon: infinity
        - identifier: treasure
          name: Treasures
          url: /en/categories/perfume/
          weight: 3
          params:
            icon: search
        - identifier: life
          name: Life Notes
          url: /en/categories/life/
          weight: 4
          params:
            icon: messages
      social:
        - identifier: github
          name: GitHub
          url: https://github.com/wenxiaoshi
          params:
            icon: brand-github

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: 

  footer:
    since: 2026

  dateFormat:
    published: 2006-01-02
    lastUpdated: 2006-01-02 15:04 MST

  sidebar:
    compact: false
    emoji: 🌙
    avatar: img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
    page: []

  colorScheme:
    toggle: true
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableRobotsTXT: true

taxonomies:
  category: categories
  tag: tags
